<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simulado de Terça - AMS</title>
    <meta
      name="description"
      content="Simulado interativo de Análise e Modelagem de Sistemas com resumo, modo claro/escuro e revisão de erros."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Análise e Modelagem de Sistemas</p>
        <h1>Simulado de Terça</h1>
      </div>
      <button id="themeToggle" class="theme-toggle" type="button">Modo escuro</button>
    </header>

    <main class="layout">
      <section class="stats" aria-label="Desempenho">
        <article>
          <span>Respondidas</span>
          <strong id="answeredCount">0</strong>
        </article>
        <article class="ok">
          <span>Acertos</span>
          <strong id="correctCount">0</strong>
        </article>
        <article class="bad">
          <span>Erros</span>
          <strong id="wrongCount">0</strong>
        </article>
        <article>
          <span>Aproveitamento</span>
          <strong id="scorePercent">0%</strong>
        </article>
      </section>

      <nav class="tabs" aria-label="Seções">
        <button class="tab active" type="button" data-panel="quiz">Simulado</button>
        <button class="tab" type="button" data-panel="summary">Resumo</button>
        <button class="tab" type="button" data-panel="review">Revisar erros</button>
      </nav>

      <section class="panel active" id="quizPanel">
        <div class="toolbar">
          <label for="topicFilter">Tema</label>
          <select id="topicFilter"></select>
          <button id="shuffleButton" type="button">Embaralhar</button>
          <button id="resetButton" type="button">Reiniciar</button>
        </div>

        <div class="progress">
          <div class="track"><div id="progressBar" class="bar"></div></div>
          <span id="progressText">0 de 0</span>
        </div>

        <article class="question-card">
          <div class="question-meta">
            <span id="questionTopic"></span>
            <span id="questionNumber"></span>
          </div>
          <h2 id="questionText"></h2>
          <div id="optionsList" class="options"></div>
          <div id="feedbackBox" class="feedback" hidden></div>
          <div class="actions">
            <button id="prevButton" type="button">Anterior</button>
            <button id="nextButton" type="button">Próxima</button>
          </div>
        </article>
      </section>

      <section class="panel" id="summaryPanel">
        <div class="heading">
          <p class="eyebrow">Resumo explicado</p>
          <h2>Matérias da prova</h2>
        </div>
        <div id="summaryList" class="summary-list"></div>
      </section>

      <section class="panel" id="reviewPanel">
        <div class="heading">
          <p class="eyebrow">Revisão direcionada</p>
          <h2>Questões que você errou</h2>
        </div>
        <div id="reviewList" class="review-list"></div>
      </section>
    </main>

    <script src="app.js?v=3"></script>
  </body>
</html>
