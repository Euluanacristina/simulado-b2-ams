<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulado B2 - AMS</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="eyebrow">B2 • Análise e Modelagem de Sistemas</p>
      <h1>Simulado</h1>
      <p class="subtitle">Questões das Unidades 3 e 4 para revisar antes da prova.</p>
    </header>

    <section class="topbar">
      <div class="filter-group">
        <label for="unitFilter">Filtrar por unidade</label>
        <select id="unitFilter">
          <option value="all">Todas</option>
          <option value="3.1">3.1</option>
          <option value="3.2">3.2</option>
          <option value="3.3">3.3</option>
          <option value="4.1">4.1</option>
          <option value="4.2">4.2</option>
          <option value="4.3">4.3</option>
        </select>
      </div>
      <div class="action-group">
        <button id="themeToggleBtn" type="button">Modo escuro</button>
        <button id="shuffleBtn" type="button">Embaralhar</button>
        <button id="resetBtn" type="button">Refazer Simulado</button>
      </div>
    </section>

    <section class="status-panel">
      <div class="status-item">
        <span class="status-label">Progresso</span>
        <strong id="progressText">Questão 1 de 1</strong>
      </div>
      <div class="status-item">
        <span class="status-label">Respondidas</span>
        <strong id="scoreText">Respondidas: 0/0</strong>
      </div>
      <div class="status-item">
        <span class="status-label">Acertos</span>
        <strong id="correctText">Acertos: 0</strong>
      </div>
      <div class="status-item">
        <span class="status-label">Erros</span>
        <strong id="wrongText">Erros: 0</strong>
      </div>
    </section>

    <section id="quizCard" class="card question-card"></section>

    <section class="nav">
      <button id="prevBtn" type="button">Anterior</button>
      <button id="nextBtn" type="button">Próxima</button>
      <button id="finishBtn" type="button">Finalizar</button>
    </section>

    <section id="resultCard" class="card hidden"></section>

    <footer class="page-note">
      <p>Material organizado para estudo e revisão das unidades da prova B2.</p>
    </footer>
  </main>

  <script src="./questions.js"></script>
  <script src="./script.js"></script>
</body>
</html>
